name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    # Linux is the gating platform. macOS runs as a best-effort signal: the cc_deps / reverse_ffi
    # paths need toolchains_llvm to resolve a clang + macOS SDK on the runner, which isn't verified
    # here, so a macOS failure doesn't fail the build.
    continue-on-error: ${{ matrix.os == 'macos-latest' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: ~/.cache/bazel
          key: bazel-${{ matrix.os }}-${{ hashFiles('MODULE.bazel.lock', '.bazelversion') }}
          restore-keys: bazel-${{ matrix.os }}-
      # The Lean and clang toolchains are downloaded + pinned, but on Linux toolchains_llvm compiles
      # against host glibc headers (build-essential) and its ld.lld/clang link host libs (libxml2).
      # GitHub runners ship both; install for safety / parity with the bare GitLab CI image.
      - name: Install build-essential (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq build-essential libxml2
      - name: Test (examples, unit, analysis, multi, dep)
        run: bazel test //... --test_output=errors
      - name: API docs generate
        run: bazel build //docs:api

  negative:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: ~/.cache/bazel
          key: bazel-negative-${{ hashFiles('MODULE.bazel.lock', '.bazelversion') }}
          restore-keys: bazel-negative-
      - name: Install build-essential (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq build-essential libxml2
      # Each //tests/negative target must FAIL to build (false proof, missing import, undefined extern).
      - name: Expect build failures
        run: tests/negative/expect_failures.sh

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: ~/.cache/bazel
          key: bazel-e2e-${{ hashFiles('e2e/MODULE.bazel.lock', '.bazelversion') }}
          restore-keys: bazel-e2e-
      - name: Install build-essential (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq build-essential libxml2
      # Consume rules_lean4 as a separate, renamed module (local_path_override) — the cross-repo
      # integration the in-repo suite can't exercise. Catches generated-BUILD/label regressions.
      - name: External consumer module
        working-directory: e2e
        run: bazel test //... --test_output=errors

  hermeticity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: ~/.cache/bazel
          key: bazel-sandbox-${{ hashFiles('MODULE.bazel.lock', '.bazelversion') }}
          restore-keys: bazel-sandbox-
      - name: Install build-essential (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq build-essential libxml2
      # Re-run every action under the sandbox to verify inputs are completely declared.
      - name: Sandboxed test
        run: bazel test //... --spawn_strategy=sandboxed --test_output=errors
      # The same build twice must produce byte-identical outputs.
      - name: Determinism
        run: |
          bazel build //tests/exe:fib //tests/multi:multi
          h1=$(sha256sum bazel-bin/tests/exe/fib bazel-bin/tests/multi/multi | cut -d' ' -f1)
          bazel clean
          bazel build //tests/exe:fib //tests/multi:multi
          h2=$(sha256sum bazel-bin/tests/exe/fib bazel-bin/tests/multi/multi | cut -d' ' -f1)
          test "$h1" = "$h2" || { echo "non-deterministic output"; exit 1; }

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Buildifier
        run: |
          curl -sSL -o /tmp/buildifier \
            https://github.com/bazelbuild/buildtools/releases/download/v7.3.1/buildifier-linux-amd64
          chmod +x /tmp/buildifier
          /tmp/buildifier --lint=warn \
            --warnings=-function-docstring-args,-function-docstring-return \
            --mode=check -r .
